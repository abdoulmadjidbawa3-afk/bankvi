<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BANKVI — Connexion</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #185FA5;
      --green: #1D9E75;
      --red-bg: #FAECE7;
      --red-text: #993C1D;
      --green-bg: #E1F5EE;
      --green-text: #0F6E56;
      --border: #e8e8e8;
      --text: #1a1a1a;
      --text-sec: #6b6b6b;
      --text-ter: #a0a0a0;
      --bg: #f5f5f3;
      --bg-card: #ffffff;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .box {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 380px;
      border: 0.5px solid var(--border);
    }
    .logo {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .logo span { color: var(--blue); }
    .tagline {
      text-align: center;
      font-size: 13px;
      color: var(--text-sec);
      margin-bottom: 1.5rem;
    }
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 3px;
      margin-bottom: 1.5rem;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-sec);
    }
    .tab.active {
      background: var(--bg-card);
      color: var(--text);
      border: 0.5px solid var(--border);
    }
    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 12px;
      color: var(--text-sec);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 12px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      background: var(--bg-card);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--blue); }
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      color: #fff;
    }
    .btn-blue { background: var(--blue); }
    .btn-green { background: var(--green); }
    .msg {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
    }
    .msg.error { background: var(--red-bg); color: var(--red-text); }
    .msg.success { background: var(--green-bg); color: var(--green-text); }
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-ter);
      margin-top: 1.5rem;
    }
    #form-register { display: none; }
  </style>
</head>
<body>

<div class="box">
  <div class="logo">BANK<span>VI</span></div>
  <p class="tagline">Gère ton commerce. Protège ton argent.</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login', this)">Connexion</button>
    <button class="tab" onclick="switchTab('register', this)">Inscription</button>
  </div>

  <!-- CONNEXION -->
  <div id="form-login">
    <div class="msg error" id="err-login"></div>
    <div class="field">
      <label>Numéro de téléphone</label>
      <input type="tel" id="login-tel" placeholder="Ex: 90000000">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="login-pwd" placeholder="Ton mot de passe">
    </div>
    <button class="btn btn-blue" onclick="seConnecter()">Se connecter</button>
  </div>

  <!-- INSCRIPTION -->
  <div id="form-register">
    <div class="msg error" id="err-register"></div>
    <div class="msg success" id="suc-register"></div>
    <div class="field">
      <label>Nom complet</label>
      <input type="text" id="reg-nom" placeholder="Ex: Kofi Mensah">
    </div>
    <div class="field">
      <label>Nom de ta boutique</label>
      <input type="text" id="reg-boutique" placeholder="Ex: Boutique Mensah">
    </div>
    <div class="field">
      <label>Numéro de téléphone</label>
      <input type="tel" id="reg-tel" placeholder="Ex: 90000000">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="reg-pwd" placeholder="Minimum 6 caractères">
    </div>
    <button class="btn btn-green" onclick="sInscrire()">Créer mon compte</button>
  </div>

  <p class="footer">BANKVI v1.0 — Fait au Togo 🇹🇬</p>
</div>

<script>
  const API = window.location.origin + '/api';

  if (localStorage.getItem('bankvi_token')) {
    window.location.href = 'index.html';
  }

  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('form-login').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  }

  function afficherErreur(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function cacherMessages() {
    document.querySelectorAll('.msg').forEach(m => m.style.display = 'none');
  }

  async function seConnecter() {
    cacherMessages();
    const tel = document.getElementById('login-tel').value.trim();
    const pwd = document.getElementById('login-pwd').value;

    if (!tel || !pwd) {
      afficherErreur('err-login', 'Remplis tous les champs');
      return;
    }

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifiant: tel, password: pwd })
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('bankvi_user',  JSON.stringify(data.user));
        localStorage.setItem('bankvi_token', data.token);
        window.location.href = 'index.html';
      } else {
        afficherErreur('err-login', data.message || 'Identifiants incorrects');
      }
    } catch(e) {
      afficherErreur('err-login', 'Erreur serveur — réessaie');
    }
  }

  async function sInscrire() {
    cacherMessages();
    const nom      = document.getElementById('reg-nom').value.trim();
    const boutique = document.getElementById('reg-boutique').value.trim();
    const tel      = document.getElementById('reg-tel').value.trim();
    const pwd      = document.getElementById('reg-pwd').value;

    if (!nom || !boutique || !tel || !pwd) {
      afficherErreur('err-register', 'Remplis tous les champs');
      return;
    }
    if (pwd.length < 6) {
      afficherErreur('err-register', 'Mot de passe trop court — minimum 6 caractères');
      return;
    }

    try {
      const res  = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nom, boutique, tel, password: pwd })
      });
      const data = await res.json();

      if (res.ok) {
        const suc = document.getElementById('suc-register');
        suc.textContent = 'Compte créé ! Tu peux te connecter.';
        suc.style.display = 'block';
        setTimeout(() => switchTab('login', document.querySelector('.tab')), 2000);
      } else {
        afficherErreur('err-register', data.message || 'Erreur inscription');
      }
    } catch(e) {
      afficherErreur('err-register', 'Erreur serveur — réessaie');
    }
  }
</script>

</body>
</html>
